name: Sync to Hugging Face Spaces

on:
  push:
    branches: [master]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git push https://labhanshgoyal:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/labhanshgoyal/speech-emotion-recognition master --force
